<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件管理系统 - 登录</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div class="container-fluid d-flex justify-content-center align-items-center min-vh-100">
        <div class="card shadow-lg" style="width: 420px;">
            <div class="card-body p-5">
                <h1 class="text-center mb-4">📁 文件管理系统</h1>
                
                <!-- 登录表单 -->
                <div id="loginForm" class="form-container">
                    <h3 class="mb-4 text-center">登录</h3>

                    <!-- 用户 / 管理员 登录切换 -->
                    <div class="btn-group w-100 mb-4" role="group" aria-label="Login role switch">
                        <button type="button"
                                id="userLoginTab"
                                class="btn btn-primary active"
                                onclick="setLoginRole('viewer')">
                            用户登录
                        </button>
                        <button type="button"
                                id="adminLoginTab"
                                class="btn btn-outline-secondary"
                                onclick="setLoginRole('admin')">
                            管理员登录
                        </button>
                    </div>

                    <form id="login-form" onsubmit="handleLogin(event)">
                        <div class="mb-3">
                            <label for="loginUsername" class="form-label">账号</label>
                            <input type="text" class="form-control" id="loginUsername" 
                                   placeholder="请输入账号" required>
                        </div>
                        <div class="mb-3">
                            <label for="loginPassword" class="form-label">密码</label>
                            <input type="password" class="form-control" id="loginPassword" 
                                   placeholder="请输入密码" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">登录</button>
                    </form>
                    <p class="text-center">
                        还没有账户？
                        <a href="#" onclick="switchToRegister(event)">立即注册</a>
                    </p>
                    <p class="text-muted small mt-2">
                        默认示例账号：普通用户 viewer/viewer123，管理员 admin/admin123
                    </p>
                </div>

                <!-- 注册表单 -->
                <div id="registerForm" class="form-container d-none">
                    <h3 class="mb-4">注册</h3>
                    <form id="register-form" onsubmit="handleRegister(event)">
                        <div class="mb-3">
                            <label for="regUsername" class="form-label">用户名</label>
                            <input type="text" class="form-control" id="regUsername" 
                                   placeholder="请输入用户名" required>
                        </div>
                        <div class="mb-3">
                            <label for="regPassword" class="form-label">密码</label>
                            <input type="password" class="form-control" id="regPassword" 
                                   placeholder="请输入密码" required>
                        </div>
                        <div class="mb-3">
                            <label for="regRole" class="form-label">身份</label>
                            <select class="form-select" id="regRole" required>
                                <option value="">--请选择--</option>
                                <option value="viewer">浏览者</option>
                                <option value="admin">管理员</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success w-100 mb-3">注册</button>
                    </form>
                    <p class="text-center">
                        已有账户？
                        <a href="#" onclick="switchToLogin(event)">立即登录</a>
                    </p>
                </div>

                <!-- 提示消息 -->
                <div id="alertMessage" class="alert d-none mt-3" role="alert"></div>
            </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>

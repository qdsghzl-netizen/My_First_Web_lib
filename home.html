<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件管理系统 - 主页</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">📁 文件管理系统</span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="nav-link">欢迎，<span id="currentUser"></span>（<span id="userRole"></span>）</span>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-outline-light" onclick="handleLogout()">退出登录</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <!-- 左侧导航 -->
            <div class="col-md-3">
                <div class="list-group">
                    <button class="list-group-item list-group-item-action active" onclick="switchTab('all-files')">
                        <i class="bi bi-files"></i> 全部文件
                    </button>
                    <button class="list-group-item list-group-item-action" onclick="switchTab('my-collections')">
                        <i class="bi bi-bookmark-heart"></i> 我的收藏
                    </button>
                    <button class="list-group-item list-group-item-action" onclick="switchTab('categories')">
                        <i class="bi bi-folder"></i> 文件分类
                    </button>
                    <div id="admin-menu" class="d-none">
                        <button class="list-group-item list-group-item-action text-danger" onclick="switchTab('manage-files')">
                            <i class="bi bi-plus-circle"></i> 添加文件（管理员）
                        </button>
                        <button class="list-group-item list-group-item-action text-danger" onclick="switchTab('manage-categories')">
                            <i class="bi bi-folder-plus"></i> 管理分类（管理员）
                        </button>
                    </div>
                </div>
            </div>

            <!-- 右侧内容区域 -->
            <div class="col-md-9">
                <!-- 全部文件 -->
                <div id="all-files" class="tab-content">
                    <h3>全部文件</h3>
                    <input type="text" class="form-control mb-3" id="searchInput" 
                           placeholder="搜索文件..." onkeyup="searchFiles()">
                    <div id="filesList" class="row"></div>
                </div>

                <!-- 我的收藏 -->
                <div id="my-collections" class="tab-content d-none">
                    <h3>我的收藏</h3>
                    <div id="collectionsList" class="row"></div>
                </div>

                <!-- 文件分类 -->
<div id="categories" class="tab-content d-none">
    <h3>文件分类</h3>
    <div id="categoriesList" class="row"></div>
</div>

<!-- 分类详情页面 - 新增！ -->
<div id="category-detail" class="tab-content d-none">
    <div class="mb-3">
        <button class="btn btn-secondary" id="backToCategories">
            <i class="bi bi-arrow-left"></i> 返回分类列表
        </button>
    </div>
    <h3 id="categoryDetailTitle">分类详情</h3>
    <div class="mb-3">
        <input type="text" class="form-control" id="categorySearchInput" 
               placeholder="在该分类中搜索文件..." onkeyup="searchCategoryFiles()">
    </div>
    <div id="categoryFilesList" class="row"></div>
</div>

                <!-- 添加文件（管理员） -->
                <div id="manage-files" class="tab-content d-none">
                    <h3>添加新文件</h3>
                    <form id="addFileForm" onsubmit="handleAddFile(event)" class="bg-white p-4 rounded shadow-sm">
                        <div class="mb-3">
                            <label for="fileName" class="form-label">文件名</label>
                            <input type="text" class="form-control" id="fileName" required>
                        </div>
                        <div class="mb-3">
                            <label for="fileCategory" class="form-label">分类</label>
                            <select class="form-select" id="fileCategory" required>
                                <option value="">--请选择分类--</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="fileUrl" class="form-label">文件链接（URL）</label>
                            <input type="url" class="form-control" id="fileUrl" required>
                        </div>
                        <div class="mb-3">
                            <label for="fileDescription" class="form-label">文件描述</label>
                            <textarea class="form-control" id="fileDescription" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="fileAccess" class="form-label">访问权限</label>
                            <select class="form-select" id="fileAccess" required>
                                <option value="public">公开</option>
                                <option value="private">私密</option>
                                <option value="viewers-only">仅浏览者</option>
                                <option value="admins-only">仅管理员</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success">添加文件</button>
                    </form>
                    <div id="addFileMessage" class="alert mt-3 d-none"></div>
                </div>

                <!-- 管理分类（管理员） - 多层级版本 -->
<div id="manage-categories" class="tab-content d-none">
    <h3>管理文件分类</h3>
    
    <!-- 添加分类表单 -->
    <form id="addCategoryForm" onsubmit="handleAddCategory(event)" class="bg-white p-4 rounded shadow-sm mb-4">
        <div class="row">
            <div class="col-md-4">
                <input type="text" class="form-control" id="categoryName" 
                       placeholder="分类名称" required>
            </div>
            <div class="col-md-4">
                <select class="form-select" id="parentCategorySelect">
                    <option value="">-- 顶级分类 --</option>
                </select>
            </div>
            <div class="col-md-4">
                <button type="submit" class="btn btn-primary w-100">添加分类</button>
            </div>
        </div>
        <small class="text-muted d-block mt-2">
            选择"顶级分类"表示创建一级分类，选择其他分类表示创建该分类的子分类
        </small>
    </form>

    <!-- 分类树 -->
    <h5>分类结构</h5>
    <div id="categoriesManageList"></div>
</div>
            </div>
        </div>
    </div>

    <!-- 文件详情模态框 -->
    <div class="modal fade" id="fileModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="fileModalTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="fileModalDescription"></p>
                    <p><strong>分类：</strong><span id="fileModalCategory"></span></p>
                    <p><strong>上传者：</strong><span id="fileModalUploader"></span></p>
                    <div id="fileModalActions"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 修改文件分类模态框（管理员） -->
    <div class="modal fade" id="changeCategoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-folder-symlink"></i> 修改文件所属分类</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="changeCategoryFileId">
                    <p><strong>文件名：</strong><span id="changeCategoryFileName"></span></p>
                    <p><strong>当前分类：</strong><span id="changeCategoryCurrent" class="text-muted"></span></p>
                    <form id="changeCategoryForm" onsubmit="handleChangeFileCategory(event)">
                        <div class="mb-3">
                            <label for="changeFileCategorySelect" class="form-label">新分类</label>
                            <select class="form-select" id="changeFileCategorySelect" required>
                                <option value="">--选择新分类--</option>
                            </select>
                            <small class="text-muted">请选择具体课程（如：数学 / 大一 / 高等数学）</small>
                        </div>
                        <button type="submit" class="btn btn-primary">保存</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
